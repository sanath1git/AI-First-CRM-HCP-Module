version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: crm_postgres
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: crm_hcp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm_network

  backend:
    build: ./backend
    container_name: crm_backend
    environment:
      DATABASE_URL: postgresql://crm_user:crm_password@postgres:5432/crm_hcp_db
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    networks:
      - crm_network
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: crm_frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - crm_network
    volumes:
      - ./frontend:/app
      - /app/node_modules

networks:
  crm_network:
    driver: bridge

volumes:
  postgres_data:

